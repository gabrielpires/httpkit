version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/gabrielpires/httpkit

run:
  go: "1.25"
